<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO Mart - Help & Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to GO Mart</h1>
        <p>We are here to help!</p>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="delivery.html">Delivery</a>
            <a href="payment.html">Payment</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>

    <main>
        <h2 class="page-title">Get In Touch</h2>
        <div class="form-container">
            <form onsubmit="event.preventDefault(); alert('Message Sent! Our support team will get back to you shortly.'); this.reset();">
                <div class="input-group">
                    <label for="contactName">Your Name</label>
                    <input type="text" id="contactName" placeholder="Jane Doe" required>
                </div>
                <div class="input-group">
                    <label for="contactEmail">Email Address</label>
                    <input type="email" id="contactEmail" placeholder="jane@example.com" required>
                </div>
                <div class="input-group">
                    <label for="subject">Topic / Subject</label>
                    <select id="subject" style="border-radius: 12px; padding: 15px; border: 1px solid #ddd; width: 100%; font-family: 'Poppins', sans-serif;">
                        <option>Where is my order?</option>
                        <option>Report an issue</option>
                        <option>General Feedback</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="How can we assist you today?" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 GO Mart Superstore.</p>
    </footer>
</body>
</html>
