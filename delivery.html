<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO Mart - Delivery Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to GO Mart</h1>
        <p>Let's get your order to you!</p>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="delivery.html" class="active">Delivery</a>
            <a href="payment.html">Payment</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h2 class="page-title">Delivery Information</h2>
        <div class="form-container">
            <form action="payment.html" onsubmit="event.preventDefault(); window.location.href='payment.html';">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Jane Doe" required>
                </div>
                <div class="input-group">
                    <label for="address">Street Address</label>
                    <input type="text" id="address" placeholder="123 Main St, Apartment 4B" required>
                </div>
                <div class="input-group">
                    <label for="city">City / Governorate</label>
                    <select id="city" required>
                        <option value="" disabled selected>Select your Governorate</option>
                        <option value="Cairo">Cairo</option>
                        <option value="Giza">Giza</option>
                        <option value="Alexandria">Alexandria</option>
                        <option value="Dakahlia">Dakahlia</option>
                        <option value="Red Sea">Red Sea</option>
                        <option value="Beheira">Beheira</option>
                        <option value="Fayoum">Fayoum</option>
                        <option value="Gharbia">Gharbia</option>
                        <option value="Ismailia">Ismailia</option>
                        <option value="Menofia">Menofia</option>
                        <option value="Minya">Minya</option>
                        <option value="Qaliubiya">Qaliubiya</option>
                        <option value="New Valley">New Valley</option>
                        <option value="Suez">Suez</option>
                        <option value="Aswan">Aswan</option>
                        <option value="Assiut">Assiut</option>
                        <option value="Beni Suef">Beni Suef</option>
                        <option value="Port Said">Port Said</option>
                        <option value="Damietta">Damietta</option>
                        <option value="Sharkia">Sharkia</option>
                        <option value="South Sinai">South Sinai</option>
                        <option value="North Sinai">North Sinai</option>
                        <option value="Qena">Qena</option>
                        <option value="Kafr El Sheikh">Kafr El Sheikh</option>
                        <option value="Matrouh">Matrouh</option>
                        <option value="Luxor">Luxor</option>
                        <option value="Sohag">Sohag</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+20 100 000 0000" required>
                </div>
                <div class="input-group">
                    <label for="notes">Delivery Instructions (Optional)</label>
                    <textarea id="notes" placeholder="e.g. Leave at the front door"></textarea>
                </div>
                <button type="submit" class="btn">Continue to Payment</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 GO Mart Superstore.</p>
    </footer>
</body>
</html>
