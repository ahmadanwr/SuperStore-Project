<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO Mart - Secure Payment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to GO Mart</h1>
        <p>Complete your premium order</p>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="delivery.html">Delivery</a>
            <a href="payment.html" class="active">Payment</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h2 class="page-title">Secure Checkout</h2>
        <div class="form-container">
            <form action="index.html" onsubmit="event.preventDefault(); alert('Payment Successful! Thank you for ordering from GO Mart!'); window.location.href='index.html';">
                <div class="input-group">
                    <label for="cardName">Name on Card</label>
                    <input type="text" id="cardName" placeholder="Jane Doe" required>
                </div>
                <div class="input-group">
                    <label for="cardNumber">Card Number</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9101 1121" required>
                </div>
                <div style="display: flex; gap: 20px;">
                    <div class="input-group" style="flex: 1;">
                        <label for="expiry">Expiry Date</label>
                        <input type="text" id="expiry" placeholder="MM/YY" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label for="cvv">CVV</label>
                        <input type="password" id="cvv" placeholder="123" required>
                    </div>
                </div>
                <button type="submit" class="btn" style="background: var(--accent); margin-top: 10px;">Confirm Payment</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 GO Mart Superstore.</p>
    </footer>
</body>
</html>
